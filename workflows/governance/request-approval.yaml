# =============================================================================
# Workflow: Request Approval
# Category: governance
#
# Creates a structured approval request: writes a machine-readable record
# to the approval-requests index AND a human-readable comment on the case.
# The approval-monitor workflow polls for human responses and dispatches
# the target agent when approved.
#
# Author: Security Agent Mesh
# =============================================================================
name: Request Approval
description: Request human approval for a Tier 2 governance-gated action on an existing case.
enabled: true

tags:
  - agent-mesh
  - governance

triggers:
  - type: manual

inputs:
  - name: case_id
    type: string
    description: "The existing case ID to add the approval request to"
    required: true
  - name: action_type
    type: string
    description: "The action requiring approval (e.g., isolate_host, enable_rule)"
    required: true
  - name: recommending_agent
    type: string
    description: "Agent ID that recommended this action"
    required: true
  - name: target_agent
    type: string
    description: "Agent ID that should execute the action if approved"
    required: true
  - name: justification
    type: string
    description: "Why this action should be taken"
    required: true
  - name: risk_tier
    type: string
    description: "Risk tier of the action"
    required: true
  - name: target
    type: string
    description: "What the action targets (hostname, endpoint ID, rule ID, etc.)"
    required: true
  - name: investigation_id
    type: string
    description: "Investigation document ID for context continuity"
    required: false
  - name: context
    type: string
    description: "Full context to pass to the target agent when dispatched (case ID, alert details, instructions)"
    required: true

consts:
  es_url: "__ES_URL__"
  es_api_key: "__ES_API_KEY__"

steps:

  - name: generate_approval_id
    type: console
    with:
      message: "apr-{{ 'now' | date: '%s%N' }}"

  - name: write_approval_request
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/approval-requests/_doc"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        approval_id: "{{ steps.generate_approval_id.output }}"
        case_id: "{{ inputs.case_id }}"
        investigation_id: "{{ inputs.investigation_id | default: '' }}"
        requesting_agent: "{{ inputs.recommending_agent }}"
        target_agent: "{{ inputs.target_agent }}"
        action_type: "{{ inputs.action_type }}"
        action_details: "{{ inputs.action_type }} on {{ inputs.target }}"
        context: "{{ inputs.context }}"
        target: "{{ inputs.target }}"
        status: "pending"
        risk_tier: "{{ inputs.risk_tier }}"
        justification: "{{ inputs.justification }}"
        created_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"

  - name: add_approval_comment
    type: http
    with:
      method: POST
      url: "__KIBANA_URL__/s/__KIBANA_SPACE__/api/cases/{{ inputs.case_id }}/comments"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey __KIBANA_API_KEY__"
        kbn-xsrf: "true"
        elastic-api-version: "2023-10-31"
      body:
        type: "user"
        comment: |
          ## Tier 2 Action — Human Approval Required

          **Approval ID:** {{ steps.generate_approval_id.output }}

          | Field | Value |
          |-------|-------|
          | **Action** | {{ inputs.action_type }} |
          | **Target** | {{ inputs.target }} |
          | **Risk Tier** | {{ inputs.risk_tier }} |
          | **Recommended by** | {{ inputs.recommending_agent }} |
          | **Will be executed by** | {{ inputs.target_agent }} |

          ### Justification

          {{ inputs.justification }}

          ---

          **To approve:** Reply with a comment containing **APPROVED**
          **To deny:** Reply with a comment containing **DENIED** and the reason

          The approval monitor checks every 2 minutes. Once you respond, the action will be dispatched automatically.
        owner: "securitySolution"

  - name: confirm
    type: console
    with:
      message: "Approval {{ steps.generate_approval_id.output }} requested on case {{ inputs.case_id }} for {{ inputs.action_type }} targeting {{ inputs.target }}. Awaiting human response."
